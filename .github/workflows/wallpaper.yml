name: Denní tapeta

on:
  schedule:
    - cron: "30 2 * * *"   # 03:30 UTC = 4:30/5:30 ráno v Praze
  workflow_dispatch: {}     # tlačítko pro ruční spuštění

permissions:
  contents: write

jobs:
  snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y > /dev/null
          npm i playwright
          npx playwright install --with-deps chromium

      - name: Render wallpapers
        run: node scripts/snap.mjs
        env:
          # sem patří vaše preferované parametry vzhledu
          PAGE_URL: "https://linhavo.github.io/slovo-dne/?ui=0"

      - name: Commit & push
        run: |
          git config user.name "tapeta-bot"
          git config user.email "actions@users.noreply.github.com"
          git add wallpaper-light.png wallpaper-dark.png wallpaper-mac-light.png wallpaper-mac-dark.png
          git commit -m "tapeta $(date +%F)" || echo "beze změny"
          git push
